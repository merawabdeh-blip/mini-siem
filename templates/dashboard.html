<!DOCTYPE html>
<html>
<head>
    <title>Mini SIEM Dashboard</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .box {
            flex: 1;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        .alert {
            font-weight: bold;
        }

        .highlight {
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>🔥 Mini SIEM Dashboard</h1>

<div class="container">

    <!-- Logs -->
    <div class="box">
        <h2>Logs</h2>
        <div id="logs"></div>
    </div>

    <!-- Alerts -->
    <div class="box">
        <h2>Alerts 🚨</h2>
        <h3 id="alertCount"></h3>
        <div id="alerts"></div>
    </div>

</div>

<script>
function getColor(type) {
    if (type === "BRUTE_FORCE") return "red";
    if (type === "PORT_SCAN") return "orange";
    if (type === "AI_ANOMALY") return "yellow";
    if (type === "SUSPICIOUS_LOGIN_SUCCESS") return "purple";
    return "white";
}

async function fetchData() {
    async function fetchData() {
    let alerts = [];

    try {
        alerts = await fetch('/logs/alerts').then(r => r.json());
    } catch (e) {
        console.log("Alerts error:", e);
    }

    document.getElementById('logs').innerHTML =
        "<p>Live log stream disabled temporarily</p>";

    document.getElementById('alertCount').innerText =
        "Total Alerts: " + alerts.length;

    document.getElementById('alerts').innerHTML =
        alerts.slice(0, 15).map((a, i) => {
            let style = i === 0 ? "font-weight:bold; font-size:18px;" : "";
            return `<p class="alert" style="${style}; color:${getColor(a.type)}">
                ${a.type} - ${a.source_ip}<br>
                ${a.description || a.details || ""}
            </p>`;
        }).join('');
}

setInterval(fetchData, 3000);
fetchData();
</script>

</body>
</html>
