<!DOCTYPE html>
<html>
<head>
    <title>Mini SIEM Dashboard</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .box {
            flex: 1;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            min-height: 250px;
        }

        .alert {
            margin-bottom: 14px;
            font-weight: bold;
            line-height: 1.5;
        }

        .meta {
            color: #cbd5e1;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h1>🔥 Mini SIEM Dashboard</h1>

    <div class="container">
        <div class="box">
            <h2>Logs</h2>
            <div id="logs">Loading...</div>
        </div>

        <div class="box">
            <h2>Alerts 🚨</h2>
            <h3 id="alertCount">Loading...</h3>
            <div id="alerts">Loading...</div>
        </div>
    </div>

    <script>
        function getColor(type) {
            const t = String(type || "").toUpperCase();

            if (t.includes("BRUTE")) return "red";
            if (t.includes("PORT")) return "orange";
            if (t.includes("AI")) return "yellow";
            if (t.includes("SUSPICIOUS")) return "violet";

            return "white";
        }

        async function fetchData() {
            const logsBox = document.getElementById("logs");
            const alertsBox = document.getElementById("alerts");
            const countBox = document.getElementById("alertCount");

            try {
                const res = await fetch("/logs/alerts");
                const alerts = await res.json();

                logsBox.innerHTML = "<p class='meta'>Live log stream disabled temporarily</p>";
                countBox.innerText = "Total Alerts: " + alerts.length;

                if (!alerts || alerts.length === 0) {
                    alertsBox.innerHTML = "<p class='meta'>No alerts yet</p>";
                    return;
                }

                alertsBox.innerHTML = alerts.slice(0, 15).map((a, i) => {
                    const type = a.type || "UNKNOWN";
                    const ip = a.source_ip || "-";
                    const description = a.description || a.details || "";
                    const severity = a.severity || "";
                    const timestamp = a.timestamp || "";
                    const style = i === 0 ? "font-size:18px;" : "";

                    return `
                        <div class="alert" style="color:${getColor(type)}; ${style}">
                            ${type} - ${ip}
                            <div class="meta">${description}</div>
                            <div class="meta">Severity: ${severity}</div>
                            <div class="meta">${timestamp}</div>
                        </div>
                    `;
                }).join("");
            } catch (err) {
                console.log("Dashboard error:", err);
                logsBox.innerHTML = "<p class='meta'>Could not load logs</p>";
                countBox.innerText = "Total Alerts: Error";
                alertsBox.innerHTML = "<p class='meta'>Could not load alerts</p>";
            }
        }

        setInterval(fetchData, 3000);
        fetchData();
    </script>

</body>
</html>
